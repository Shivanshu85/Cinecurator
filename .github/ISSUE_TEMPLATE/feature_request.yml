name: "✨ Feature Request"
description: "Suggest an idea or improvement for CineCurator"
title: "[FEATURE]: "
labels: ["enhancement"]
assignees:
  - Shivanshu85
body:
  - type: markdown
    attributes:
      value: |
        We welcome feature requests and community ideas! Please share details about the proposed enhancement.

  - type: textarea
    id: feature-description
    attributes:
      label: "Feature Description"
      description: "Is your feature request related to a problem or a new capability? Please describe."
      placeholder: "I would like CineCurator to support..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
      description: "Describe the solution you'd like to see implemented."
      placeholder: "Implement a hybrid collaborative filtering model alongside TF-IDF..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternative Solutions Considered"
      description: "Describe any alternative solutions or features you've considered."
      placeholder: "Using client-side vector search via WebAssembly..."
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: "Add any other context, screenshots, or mockups about the feature request."
    validations:
      required: false
