name: "🐛 Bug Report"
description: "Create a report to help us reproduce and fix a bug in CineCurator"
title: "[BUG]: "
labels: ["bug", "triage"]
assignees:
  - Shivanshu85
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report an issue! Please fill out the form below as completely as possible.

  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "A clear and concise description of what the bug is."
      placeholder: "Describe the unexpected behavior..."
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: "Affected Component"
      description: "Which part of CineCurator is experiencing the bug?"
      options:
        - "Next.js Frontend (UI / React / Styling)"
        - "FastAPI ML Recommendation Service"
        - "Supabase Authentication / Library Persistence"
        - "TMDB / OMDb / External API Proxy"
        - "YouTube Trailer Modal"
        - "Deployment / Vercel / Render"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "Detailed steps to reproduce the behavior."
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "A clear and concise description of what you expected to happen."
      placeholder: "Expected recommendations to load in < 50ms..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Console Logs or Screenshots"
      description: "Paste relevant browser console logs, terminal output, or attach screenshots."
      placeholder: "Paste error stack traces or network logs here..."
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: "Environment Information"
      description: "Browser, Node.js version, Python version, OS, etc."
      placeholder: "Node v20.x, Python 3.11, Chrome 124, Windows 11 / macOS"
    validations:
      required: false
